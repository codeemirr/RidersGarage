<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riders Garage</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white font-sans">

    <!-- Header -->
    <header class="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center px-8">
        <div class="flex items-center gap-3">
            <span class="text-4xl">🏍️</span>
            <h1 class="text-3xl font-bold tracking-tighter">Riders Garage</h1>
        </div>
    </header>

    <div class="flex h-[calc(100vh-4rem)] overflow-hidden">
        
        <!-- Sol Sidebar -->
        <aside class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col py-8">
            <nav class="flex-1 px-3 space-y-2">
                <div onclick="return false" class="flex items-center gap-4 px-6 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer text-lg">
                    🏠 Ana Sayfa
                </div>
                <div onclick="return false" class="flex items-center gap-4 px-6 py-4 bg-zinc-800 rounded-2xl cursor-pointer text-lg font-medium">
                    🗺️ Harita
                </div>
                <div onclick="return false" class="flex items-center gap-4 px-6 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer text-lg">
                    💬 Mesajlar
                </div>
                <div onclick="return false" class="flex items-center gap-4 px-6 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer text-lg">
                    👤 Profil
                </div>
            </nav>
            <div class="px-6 text-xs text-zinc-500 mt-auto">
                Demo • Tek kişilik proje
            </div>
        </aside>

        <!-- Ana İçerik: Harita + Chat -->
        <div class="flex flex-1">
            
            <!-- Harita Alanı -->
            <div id="map-container" class="flex-1 relative">
                <div id="map" class="absolute inset-0"></div>
            </div>

            <!-- Sağ Chat Paneli -->
            <div class="w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
                <div class="p-5 border-b border-zinc-800 flex items-center justify-between bg-zinc-900">
                    <h2 class="text-xl font-semibold">Canlı Sohbet</h2>
                    <div class="px-3 py-1 bg-emerald-500 text-xs font-medium rounded-3xl flex items-center gap-1">
                        <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
                        4 online
                    </div>
                </div>
                
                <!-- Mesajlar -->
                <div id="chat-messages" class="flex-1 p-5 overflow-y-auto space-y-5"></div>
                
                <!-- Mesaj Gönderme -->
                <div class="p-5 border-t border-zinc-800 bg-zinc-900">
                    <div class="flex gap-3">
                        <input id="chat-input" 
                               type="text" 
                               class="flex-1 bg-zinc-800 text-white placeholder-zinc-400 rounded-3xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="Mesaj yaz...">
                        <button id="send-btn"
                                class="bg-blue-600 hover:bg-blue-500 px-8 rounded-3xl font-medium transition">
                            Gönder
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
