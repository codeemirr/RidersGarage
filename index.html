<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riders Garage</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Üst Bar -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🏍️</span>
            <span class="logo-text">Riders Garage</span>
        </div>
        <nav class="nav-tabs">
            <a href="#" class="nav-tab">🏠 Ana Sayfa</a>
            <a href="#" class="nav-tab active">🗺️ Harita</a>
            <a href="#" class="nav-tab">💬 Mesajlar</a>
            <a href="#" class="nav-tab">👥 Gruplar</a>
            <a href="#" class="nav-tab">👤 Profil</a>
        </nav>
    </header>

    <!-- Ana İçerik: Chat (sol) + Harita (sağ) -->
    <main class="content">

        <!-- Sol: Chat -->
        <div class="chat-panel">
            <div class="chat-header">
                <span class="chat-title">Canlı Sohbet</span>
                <span class="online-badge">
                    <span class="online-dot"></span>
                    4 online
                </span>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input id="chat-input" type="text" placeholder="Mesaj yaz..." />
                <button id="send-btn">Gönder</button>
            </div>
        </div>

        <!-- Sağ: Harita -->
        <div class="map-panel">
            <div id="map"></div>
        </div>

    </main>

    <!-- Mobil Alt Menü -->
    <nav class="mobile-nav">
        <a href="#">🏠<span>Ana Sayfa</span></a>
        <a href="#" class="active">🗺️<span>Harita</span></a>
        <a href="#">💬<span>Mesajlar</span></a>
        <a href="#">👥<span>Gruplar</span></a>
        <a href="#">👤<span>Profil</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
